$kind: http-request
method: GET
url: '{{baseUrl}}/feed?limit={{limit}}&offset={{offset}}'
order: 1000
description: Return the public feed only.
queryParams:
  - key: limit
    value: '{{limit}}'
  - key: offset
    value: '{{offset}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("public feed returns 200", function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test("feed payload shape is valid", function () {
        pm.expect(json).to.have.property("items");
        pm.expect(json).to.have.property("paging");
        pm.expect(json.items).to.be.an("array");
      });
      if (json.items.length > 0) {
        pm.environment.set("publicAdventureId", json.items[0].id);
      }
