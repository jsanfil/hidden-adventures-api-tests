$kind: http-request
method: POST
url: '{{baseUrl}}/auth/handle'
order: 1200
description: |-
  Complete handle selection for an authenticated user that still needs a public handle. Local smoke checks use `Authorization: Bearer {{newUserToken}}` to exercise the fixture-backed signup flow.
auth:
  type: bearer
  credentials:
    token: '{{newUserToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "handle": "{{desiredHandle}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("auth handle returns a handled status", function () {
        pm.expect([200, 409]).to.include(pm.response.code);
      });
      const json = pm.response.json();
      if (pm.response.code === 200) {
        pm.test("auth handle success payload shape is valid", function () {
          pm.expect(json.accountState).to.be.a("string");
          pm.expect(json).to.have.property("user");
          pm.expect(json).to.have.property("suggestedHandle");
          pm.expect(json).to.have.property("recoveryEmail");
        });
      }
      if (pm.response.code === 409) {
        pm.test("auth handle conflict returns the locked error shape", function () {
          pm.expect(json.error).to.eql("Handle unavailable.");
        });
      }
