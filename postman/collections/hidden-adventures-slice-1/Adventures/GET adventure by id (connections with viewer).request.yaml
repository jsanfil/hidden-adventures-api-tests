$kind: http-request
method: GET
url: '{{baseUrl}}/adventures/{{connectionsAdventureId}}'
order: 3000
description: Confirm an authenticated connected viewer can resolve a connections-only adventure. Set `authToken` to a valid Cognito ID token before running this request.
headers:
  - key: Authorization
    value: 'Bearer {{connectedViewerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("viewer can access connections adventure", function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test("connections adventure response contains item", function () {
        pm.expect(json.item).to.be.an("object");
        pm.expect(json.item.id).to.eql(pm.environment.get("connectionsAdventureId"));
      });
