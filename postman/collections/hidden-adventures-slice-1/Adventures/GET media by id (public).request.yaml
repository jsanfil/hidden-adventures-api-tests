$kind: http-request
method: GET
url: '{{baseUrl}}/media/{{publicAdventureMediaId}}'
order: 1300
description: Fetch the authenticated image bytes for a public adventure media id discovered from the media-list route.
auth:
  type: bearer
  credentials:
    token: '{{nonConnectedViewerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("public media returns 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("public media response is an image", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("image/");
      });
