$kind: http-request
name: GET me profile
method: GET
url: '{{baseUrl}}/me/profile'
order: 3000
description: Fetch the authenticated viewer's profile record.
auth:
  type: bearer
  credentials:
    token: '{{connectedViewerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("me profile returns 200", function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test("me profile payload shape is valid", function () {
        pm.expect(json.profile).to.be.an("object");
        pm.expect(json.profile).to.not.have.property("email");
      });
